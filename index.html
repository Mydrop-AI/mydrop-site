<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MydropAI</title>
    <meta
      name="description"
      content="Mydrop helps overloaded solo social managers create, schedule, and scale content with one clear workflow."
    />
    <script>
      window.lemonSqueezyAffiliateConfig = { store: "mydrop" };
      window.dataLayer = window.dataLayer || [];

      (function () {
        var loaded = false;
        var isReactSnap = navigator.userAgent === "ReactSnap";

        function appendScript(src) {
          var script = document.createElement("script");
          script.async = true;
          script.src = src;
          document.head.appendChild(script);
        }

        function loadThirdPartyScripts() {
          if (loaded || isReactSnap) {
            return;
          }

          loaded = true;
          appendScript("https://lmsqueezy.com/affiliate.js");
          window.dataLayer.push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
          appendScript("https://www.googletagmanager.com/gtm.js?id=GTM-NT9H9RK7");
        }

        function scheduleThirdPartyScripts() {
          var schedule = function () {
            if ("requestIdleCallback" in window) {
              window.requestIdleCallback(loadThirdPartyScripts, { timeout: 3000 });
              return;
            }

            window.setTimeout(loadThirdPartyScripts, 1500);
          };

          if (document.readyState === "complete") {
            schedule();
            return;
          }

          window.addEventListener("load", schedule, { once: true });
        }

        scheduleThirdPartyScripts();
      })();
    </script>
    <style>
      .iub__us-widget,
      .iubenda-tp-btn.iubenda-cs-preferences-link,
      .iubenda-tp-btn-container {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/favicon.png" />
  </head>
  <body>
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-NT9H9RK7"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        let attempts = 0;
        const maxAttempts = 100;
        const checkAndClickButton = setInterval(() => {
          const button = document.querySelector(".iubenda-cs-accept-btn");
          if (button) {
            button.click();
            clearInterval(checkAndClickButton);
          } else if (attempts >= maxAttempts) {
            clearInterval(checkAndClickButton);
          }
          attempts++;
        }, 100);
      });
    </script>
  </body>
</html>
